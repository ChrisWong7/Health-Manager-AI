services:
  - type: web
    name: health-manager-ai
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: LLM_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      - key: PYTHONPATH
        value: ./backend
    # Optional: If you want to persist the vector DB
    # disk:
    #   name: vector-db
    #   mountPath: /app/backend/vector_store
    #   sizeGB: 1
