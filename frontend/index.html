<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人健康信息管理助手</title>
    <!-- React & ReactDOM (Local) -->
    <script src="lib/react.development.js"></script>
    <script src="lib/react-dom.development.js"></script>
    <!-- Babel for JSX (Local) -->
    <script src="lib/babel.min.js"></script>
    <!-- Tailwind CSS (Local) -->
    <script src="lib/tailwindcss.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [status, setStatus] = useState('Checking backend...');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                // Determine backend URL: 
                // If the page is opened from localhost, default to port 8000
                // If the page is opened from Render, use the same origin (empty string)
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const backendUrl = isLocal 
                    ? (window.location.port === '8000' ? '' : 'http://localhost:8000')
                    : ''; 
                
                fetch(`${backendUrl}/`)
                    .then(res => res.json())
                    .then(data => setStatus(`Online (v${data.version})`))
                    .catch(err => {
                        console.error('Backend connection failed:', err);
                        setStatus('Backend Offline');
                    });
            }, []);

            useEffect(() => {
                if (messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [messages]);

            const sendMessage = async () => {
                if (!input.trim()) return;
                
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsLoading(true);

                // Initialize empty assistant message for streaming
                const aiMsgId = Date.now();
                setMessages(prev => [...prev, { 
                    id: aiMsgId,
                    role: 'assistant', 
                    content: '',
                    sources: [],
                    isStreaming: true
                }]);

                try {
                    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                    const backendUrl = isLocal 
                        ? (window.location.port === '8000' ? '/api/v1/stream_query' : 'http://localhost:8000/api/v1/stream_query')
                        : '/api/v1/stream_query';

                    const response = await fetch(backendUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: userMsg.content })
                    });
                    
                    if (!response.ok) throw new Error('Network response was not ok');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // Keep incomplete line in buffer

                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                // We can track event types if needed
                            } else if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6);
                                // Check if it's JSON (sources) or text (answer chunk)
                                try {
                                    // Try parsing as JSON first (for sources)
                                    // But be careful, a text chunk could technically look like JSON
                                    // Our backend sends sources as strict JSON array
                                    if (dataStr.trim().startsWith('[') && dataStr.trim().endsWith(']')) {
                                        const sources = JSON.parse(dataStr);
                                        setMessages(prev => prev.map(msg => 
                                            msg.id === aiMsgId ? { ...msg, sources: sources } : msg
                                        ));
                                    } else {
                                        // It's text content (chunk)
                                        // Handle explicit newlines from backend
                                        const textChunk = dataStr.replace(/\\n/g, '\n');
                                        setMessages(prev => prev.map(msg => 
                                            msg.id === aiMsgId ? { ...msg, content: msg.content + textChunk } : msg
                                        ));
                                    }
                                } catch (e) {
                                    // Fallback to text if JSON parse fails
                                    const textChunk = dataStr.replace(/\\n/g, '\n');
                                    setMessages(prev => prev.map(msg => 
                                        msg.id === aiMsgId ? { ...msg, content: msg.content + textChunk } : msg
                                    ));
                                }
                            }
                        }
                    }
                } catch (error) {
                    setMessages(prev => prev.map(msg => 
                        msg.id === aiMsgId ? { ...msg, content: msg.content + '\n[连接中断或出错]' } : msg
                    ));
                } finally {
                    setIsLoading(false);
                    setMessages(prev => prev.map(msg => 
                        msg.id === aiMsgId ? { ...msg, isStreaming: false } : msg
                    ));
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <header className="bg-white shadow-sm p-4 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-blue-600">Health Manager</h1>
                                <p className="text-xs text-gray-500">个人健康信息管理助手 (MVP)</p>
                            </div>
                            <div className={`px-3 py-1 rounded-full text-xs font-medium ${status.includes('Online') ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                {status}
                            </div>
                        </div>
                    </header>
                    
                    <main className="flex-1 max-w-4xl mx-auto w-full p-4 flex flex-col">
                        <div className="flex-1 bg-white rounded-lg shadow-sm p-4 mb-4 overflow-y-auto min-h-[500px] flex flex-col gap-4">
                            {messages.length === 0 && (
                                <div className="text-center text-gray-400 mt-20">
                                    <p className="text-lg mb-2">👋 你好，我是你的健康助手</p>
                                    <p className="text-sm">你可以试着问我：</p>
                                    <div className="flex gap-2 justify-center mt-4">
                                        <button onClick={() => setInput('持续性头痛怎么办？')} className="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded text-sm transition">持续性头痛</button>
                                        <button onClick={() => setInput('高血压的诊断标准是什么？')} className="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded text-sm transition">高血压标准</button>
                                    </div>
                                </div>
                            )}
                            
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] rounded-lg p-4 ${msg.role === 'user' ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-800'}`}>
                                        <div className="whitespace-pre-wrap">
                                            {msg.content}
                                            {msg.isStreaming && (
                                                <span className="inline-block w-2 h-4 bg-blue-500 ml-1 animate-pulse align-middle"></span>
                                            )}
                                        </div>
                                        
                                        {msg.sources && msg.sources.length > 0 && (
                                            <div className="mt-4 pt-3 border-t border-gray-200 text-sm">
                                                <p className="font-semibold text-gray-500 mb-1">权威参考来源：</p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                    {msg.sources.map((src, i) => (
                                                        <li key={i} className="text-gray-600">
                                                            {src.title}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        {msg.actions && msg.actions.length > 0 && (
                                            <div className="mt-2 pt-2 border-t border-gray-200 text-sm">
                                                <p className="font-semibold text-gray-500 mb-1">建议行动：</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {msg.actions.map((action, i) => (
                                                        <span key={i} className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs">{action}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {isLoading && (
                                <div className="flex justify-start">
                                    <div className="bg-gray-100 rounded-lg p-4 text-gray-500">
                                        正在检索权威库...
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className="bg-white rounded-lg shadow-sm p-4">
                            <div className="flex gap-2">
                                <input 
                                    type="text" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={handleKeyPress}
                                    placeholder="输入您的健康咨询问题..." 
                                    className="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <button 
                                    onClick={sendMessage}
                                    disabled={isLoading || !input.trim()}
                                    className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition disabled:bg-blue-300"
                                >
                                    发送
                                </button>
                            </div>
                            <p className="text-center text-xs text-gray-400 mt-2">* 内容仅供参考，不能替代专业医师诊断和治疗</p>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
